version: '3.9'

services:
  postgres_diploma:
    image: postgres:16
    container_name: postgres_diploma
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: diploma_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_diploma:/var/lib/postgresql/data

volumes:
  postgres_data_diploma: